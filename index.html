<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      const errorDiv = document.createElement('div');
      errorDiv.style.position = 'fixed';
      errorDiv.style.top = '0';
      errorDiv.style.left = '0';
      errorDiv.style.width = '100%';
      errorDiv.style.padding = '20px';
      errorDiv.style.background = 'red';
      errorDiv.style.color = 'white';
      errorDiv.style.zIndex = '9999';
      errorDiv.innerHTML = '<strong>Runtime Error:</strong> ' + msg + '<br>Line: ' + lineNo + ' at ' + url;
      document.body.appendChild(errorDiv);
      return false;
    };
    window.addEventListener('unhandledrejection', function (event) {
      const errorDiv = document.createElement('div');
      errorDiv.style.position = 'fixed';
      errorDiv.style.bottom = '0';
      errorDiv.style.left = '0';
      errorDiv.style.width = '100%';
      errorDiv.style.padding = '20px';
      errorDiv.style.background = 'orange';
      errorDiv.style.color = 'black';
      errorDiv.style.zIndex = '9999';
      errorDiv.innerHTML = '<strong>Unhandled Rejection:</strong> ' + event.reason;
      document.body.appendChild(errorDiv);
    });
  </script>
  <title>Campus Spark - Ignite Your Campus Presence</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'spark-red': '#E53E3E',
            'spark-black': '#0F172A',
            'spark-white': '#FFFFFF',
            'spark-bg': '#FFFFFF',
            'spark-light-gray': '#F8FAFC',
            'spark-gray': '#475569',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            fancy: ['Outfit', 'sans-serif'],
          },
          animation: {
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            }
          }
        },
      },
    }
  </script>
  <style type="text/tailwindcss">

      .glass {

      .text-gradient-red {
        @apply bg-clip-text text-transparent bg-gradient-to-r from-spark-red via-red-500 to-orange-500;

      .bg-gradient-blue {

      }

      .bg-gradient-purple {

      }

      .card-hover {
        @apply transition-all duration-500 hover:scale-[1.02] hover:-translate-y-1 hover:shadow-2xl hover:shadow-spark-red/10;
      }
    }
    
    @layer base {
      body {
        @apply transition-colors duration-300 antialiased;
        background-color: var(--bg-primary);
        color: var(--text-primary);
      }
      h1, h2, h3, h4, h5, h6 {

      }
    }
  </style>
